<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 56" fill="none">
  <!-- ICON BACKGROUND -->
  <rect width="56" height="56" rx="12" fill="#0033B7"/>

  <!-- BAR CHART – 3 barras ascendentes -->
  <rect x="13" y="36" width="8" height="12" rx="2" fill="white" opacity="0.65"/>
  <rect x="24" y="27" width="8" height="21" rx="2" fill="white" opacity="0.85"/>
  <rect x="35" y="17" width="8" height="31" rx="2" fill="#00C070"/>

  <!-- SETA PARA CIMA na barra verde -->
  <polyline points="39,14 39,9" stroke="#00C070" stroke-width="2" stroke-linecap="round"/>
  <polyline points="36.5,11.5 39,9 41.5,11.5" stroke="#00C070" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- TEXTO SANZIO -->
  <text x="68" y="34"
    font-family="Inter, system-ui, -apple-system, sans-serif"
    font-size="22" font-weight="800" letter-spacing="-0.5"
    fill="#0033B7">Sanzio</text>

  <!-- TEXTO SERVIÇOS CONTÁBEIS -->
  <text x="69" y="48"
    font-family="Inter, system-ui, -apple-system, sans-serif"
    font-size="11" font-weight="500" letter-spacing="0.3"
    fill="#6B7280">Serviços Contábeis</text>
</svg>
