<head>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh}

/* HEADER */
header{background:linear-gradient(135deg,#1a1a2e,#0f3460);color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.4)}
header h1{font-size:1rem;font-weight:700;line-height:1.2}
header small{font-size:.68rem;opacity:.7;display:block;margin-top:2px}
#btnDownload{background:#e94560;color:#fff;border:none;padding:8px 12px;border-radius:8px;cursor:pointer;font-size:.75rem;font-weight:700;white-space:nowrap;min-width:44px;min-height:44px;display:flex;align-items:center;gap:4px;flex-shrink:0}

/* KPI CARDS — 2x2 em mobile */
.kpi-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 12px 0}
.kpi{background:#fff;border-radius:12px;padding:14px 16px;box-shadow:0 2px 8px rgba(0,0,0,.08);cursor:pointer;border:2px solid transparent;position:relative;overflow:hidden;active-scale:.97;transition:transform .1s,box-shadow .15s}
.kpi:active{transform:scale(.97)}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:4px}
.kpi.vencido::before{background:#e94560}
.kpi.urgente::before{background:#f5a623}
.kpi.noprazo::before{background:#27ae60}
.kpi.total::before{background:#0f3460}
.kpi.active{box-shadow:0 4px 16px rgba(0,0,0,.18)}
.kpi.vencido.active{border-color:#e94560}
.kpi.urgente.active{border-color:#f5a623}
.kpi.noprazo.active{border-color:#27ae60}
.kpi.total.active{border-color:#0f3460}
.kpi-num{font-size:2.2rem;font-weight:800;line-height:1}
.kpi.vencido .kpi-num{color:#e94560}
.kpi.urgente .kpi-num{color:#f5a623}
.kpi.noprazo .kpi-num{color:#27ae60}
.kpi.total .kpi-num{color:#0f3460}
.kpi-label{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px;opacity:.6;margin-top:3px}

/* FILTROS — colapso em mobile */
.filters{padding:12px;background:#fff;margin:12px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.filter-toggle{display:flex;align-items:center;justify-content:space-between;cursor:pointer;font-size:.85rem;font-weight:700;padding:4px 0}
.filter-toggle span{opacity:.5;font-size:.75rem;transition:transform .2s}
.filter-toggle span.open{transform:rotate(180deg)}
.filter-body{display:none;margin-top:10px;display:flex;flex-direction:column;gap:8px}
.filter-body select,.filter-body input{width:100%;padding:10px 12px;border:1px solid #e0e0e0;border-radius:8px;font-size:.85rem;background:#fafafa;color:#1a1a2e;appearance:none;-webkit-appearance:none}

/* CHARTS — empilhado em mobile */
.charts-row{display:flex;flex-direction:column;gap:10px;padding:0 12px}
.chart-card{background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);padding:14px}
.chart-card h3{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px;opacity:.7;margin-bottom:10px}

/* CARDS DE CHAMADO — substituem tabela em mobile */
.cards-list{padding:12px;display:flex;flex-direction:column;gap:8px}
.chamado-card{background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);padding:14px;border-left:4px solid #ddd;position:relative}
.chamado-card.VENCIDO{border-left-color:#e94560}
.chamado-card.URGENTE{border-left-color:#f5a623}
.chamado-card.NO-PRAZO{border-left-color:#27ae60}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.card-codigo{font-size:.95rem;font-weight:800;color:#0f3460}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.68rem;font-weight:700}
.badge.VENCIDO{background:#fdecea;color:#c0392b}
.badge.URGENTE{background:#fef5e4;color:#d35400}
.badge.NO-PRAZO{background:#eafaf1;color:#1e8449}
.card-unidade{font-size:.78rem;color:#555;font-weight:600;margin-bottom:6px}
.card-csc{font-size:.75rem;color:#777;line-height:1.4;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{display:flex;gap:10px;flex-wrap:wrap}
.card-meta-item{font-size:.72rem;color:#888;display:flex;flex-direction:column;gap:1px}
.card-meta-item strong{font-size:.78rem;color:#333;font-weight:700}
.sla-pct{font-size:.85rem;font-weight:800}
.card-status{font-size:.7rem;background:#f0f0f0;color:#555;padding:2px 8px;border-radius:10px;font-weight:600;margin-top:6px;display:inline-block}

#noData{display:none;text-align:center;padding:40px 20px;color:#999;font-size:.9rem}
.count-bar{text-align:center;font-size:.75rem;color:#888;padding:6px 0 2px}

/* DESKTOP overrides */
@media(min-width:768px){
  header{padding:18px 28px}
  header h1{font-size:1.3rem}
  .kpi-row{grid-template-columns:repeat(4,1fr);padding:20px 28px 0}
  .filters{margin:14px 28px;display:block}
  .filter-toggle{display:none}
  .filter-body{display:flex!important;flex-direction:row;flex-wrap:wrap;gap:10px;margin-top:0}
  .filter-body select,.filter-body input{width:auto;flex:1;min-width:160px}
  .charts-row{flex-direction:row;padding:0 28px}
  .chart-card:first-child{max-width:300px}
  .cards-list{padding:14px 28px 28px}
  .chamado-card{padding:16px 20px}
  .card-csc{-webkit-line-clamp:1}
}
</style>
</head>

const TODAY = new Date('2026-06-18');

function slaSt(sla, prev) {
  var d = new Date(prev + 'T12:00:00');
  var diff = Math.floor((d - TODAY) / 86400000);
  if (sla === '>200%' || d < TODAY) return 'VENCIDO';
  if (diff <= 3) return 'URGENTE';
  return 'NO PRAZO';
}
function slaPct(sla) {
  if (sla === '>200%') return '>200%';
  var n = parseFloat(sla);
  return isNaN(n) ? sla : (n * 100).toFixed(0) + '%';
}
function slaColor(st) { return st==='VENCIDO'?'#e94560':st==='URGENTE'?'#f5a623':'#27ae60'; }
function cscLeaf(p) { var pts=p.split('/'); return pts[pts.length-1]; }
function cscSection(p) { var pts=p.split('/'); return pts.length>=3?pts[2]:pts[pts.length-1]; }
function fmtDate(s) { if(!s) return '-'; var pts=s.split('-'); return pts[2]+'/'+pts[1]+'/'+pts[0]; }
function diffDays(prev) { var d=new Date(prev+'T12:00:00'); return Math.floor((d-TODAY)/86400000); }

var activeKpi = '';
var data = RAW.map(function(r) {
  var st = slaSt(r[3],r[4]);
  return {codigo:r[0],unidade:r[1],abertura:r[2],sla:r[3],previsao:r[4],status:r[5],resp:r[6],csc:r[7],slaSt:st};
});

// Popula filtros
var unidades=data.map(function(d){return d.unidade}).filter(function(v,i,a){return a.indexOf(v)===i}).sort();
var statuses=data.map(function(d){return d.status}).filter(function(v,i,a){return a.indexOf(v)===i}).sort();
var fU=document.getElementById('fUnidade');
var fS=document.getElementById('fStatus');
unidades.forEach(function(u){var o=document.createElement('option');o.value=o.textContent=u;fU.appendChild(o);});
statuses.forEach(function(s){var o=document.createElement('option');o.value=o.textContent=s;fS.appendChild(o);});

// Toggle filtros mobile
var filterOpen = false;
document.getElementById('filterToggle').addEventListener('click', function() {
  filterOpen = !filterOpen;
  var body = document.getElementById('filterBody');
  var arrow = document.getElementById('toggleArrow');
  body.style.display = filterOpen ? 'flex' : 'none';
  arrow.textContent = filterOpen ? '▲' : '▼';
});

// KPI click
document.querySelectorAll('.kpi').forEach(function(k) {
  k.addEventListener('click', function() {
    var f = k.dataset.filter;
    activeKpi = (activeKpi===f)?'':f;
    document.getElementById('fSla').value='';
    document.querySelectorAll('.kpi').forEach(function(x){x.classList.toggle('active',x.dataset.filter===activeKpi);});
    render();
  });
});
['fUnidade','fStatus','fSla','fBusca'].forEach(function(id){document.getElementById(id).addEventListener('input',render);});

var chartD=null,chartB=null;

function render() {
  var fUv=document.getElementById('fUnidade').value;
  var fSv=document.getElementById('fStatus').value;
  var fSlav=document.getElementById('fSla').value||activeKpi;
  var fBv=document.getElementById('fBusca').value.toLowerCase();

  var all=data.filter(function(d){
    if(fUv&&d.unidade!==fUv) return false;
    if(fSv&&d.status!==fSv) return false;
    if(fBv&&d.codigo.toLowerCase().indexOf(fBv)<0&&d.resp.toLowerCase().indexOf(fBv)<0&&d.csc.toLowerCase().indexOf(fBv)<0) return false;
    return true;
  });
  var filtered=all.filter(function(d){ return !fSlav||d.slaSt===fSlav; });

  var nV=all.filter(function(d){return d.slaSt==='VENCIDO'}).length;
  var nU=all.filter(function(d){return d.slaSt==='URGENTE'}).length;
  var nP=all.filter(function(d){return d.slaSt==='NO PRAZO'}).length;
  document.getElementById('kVencido').textContent=nV;
  document.getElementById('kUrgente').textContent=nU;
  document.getElementById('kNoPrazo').textContent=nP;
  document.getElementById('kTotal').textContent=all.length;

  // Ordena: VENCIDO > URGENTE > NO PRAZO
  filtered.sort(function(a,b){var o={VENCIDO:0,URGENTE:1,'NO PRAZO':2};return (o[a.slaSt]||3)-(o[b.slaSt]||3);});

  document.getElementById('countBar').textContent = filtered.length + ' chamado' + (filtered.length!==1?'s':'') + ' encontrado' + (filtered.length!==1?'s':'');

  // Cards
  var list=document.getElementById('cardsList');
  list.innerHTML='';
  filtered.forEach(function(d) {
    var col=slaColor(d.slaSt);
    var cls=d.slaSt.replace(' ','-');
    var dias=diffDays(d.previsao);
    var diasTxt=d.slaSt==='VENCIDO'?(dias<0?'Vencido há '+Math.abs(dias)+' dia'+(Math.abs(dias)!==1?'s':''):'Venceu hoje'):'Vence em '+dias+' dia'+(dias!==1?'s':'');
    var card=document.createElement('div');
    card.className='chamado-card '+cls;
    card.innerHTML='<div class="card-top">'
      +'<span class="card-codigo">#'+d.codigo+'</span>'
      +'<span class="badge '+cls+'">'+d.slaSt+'</span>'
      +'</div>'
      +'<div class="card-unidade">'+d.unidade+'</div>'
      +'<div class="card-csc" title="'+d.csc+'">'+cscLeaf(d.csc)+' &middot; <em>'+cscSection(d.csc)+'</em></div>'
      +'<div class="card-meta">'
      +'<div class="card-meta-item"><span>Abertura</span><strong>'+fmtDate(d.abertura)+'</strong></div>'
      +'<div class="card-meta-item"><span>Previsao</span><strong>'+fmtDate(d.previsao)+'</strong></div>'
      +'<div class="card-meta-item"><span>SLA</span><strong class="sla-pct" style="color:'+col+'">'+slaPct(d.sla)+'</strong></div>'
      +'<div class="card-meta-item"><span>Prazo</span><strong style="color:'+col+'">'+diasTxt+'</strong></div>'
      +'</div>'
      +'<span class="card-status">'+d.status+'</span>'
      +'<div style="font-size:.72rem;color:#888;margin-top:6px">'+d.resp+'</div>';
    list.appendChild(card);
  });
  document.getElementById('noData').style.display=filtered.length?'none':'block';

  // Donut
  var dsD={labels:['Vencido','Urgente','No Prazo'],datasets:[{data:[nV,nU,nP],backgroundColor:['#e94560','#f5a623','#27ae60'],borderWidth:2}]};
  if(chartD){chartD.data=dsD;chartD.update();}
  else{chartD=new Chart(document.getElementById('chartDonut'),{type:'doughnut',data:dsD,options:{plugins:{legend:{position:'bottom',labels:{font:{size:11}}}},cutout:'65%'}});}

  // Bar
  var uMap={};
  filtered.forEach(function(d){uMap[d.unidade]=(uMap[d.unidade]||0)+1;});
  var uArr=Object.entries(uMap).sort(function(a,b){return b[1]-a[1]});
  var dsB={labels:uArr.map(function(x){return x[0].replace('PUC MINAS ','').replace('PUC ','').substring(0,18)}),datasets:[{label:'Chamados',data:uArr.map(function(x){return x[1]}),backgroundColor:'#0f3460',borderRadius:4}]};
  if(chartB){chartB.data=dsB;chartB.update();}
  else{chartB=new Chart(document.getElementById('chartBar'),{type:'bar',data:dsB,options:{indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{beginAtZero:true,ticks:{stepSize:1}}}}});}
}
render();
